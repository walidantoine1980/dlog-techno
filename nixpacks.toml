providers = ["node", "python"]

[variables]
NIXPACKS_NODE_VERSION = "22"
NIXPACKS_PYTHON_VERSION = "3.11"
PORT = "3000"

[phases.install]
cmds = []

[phases.build]
cmds = [
    "bash build.sh"
]

[start]
cmd = "cd backend && /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
